apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vault-route
  namespace: vault
spec:
  hostnames:
    - "vault.internal"
  parentRefs:
    - name: tailscale-gateway
      namespace: tailscale
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: vault
          namespace: vault
          port: 8200
