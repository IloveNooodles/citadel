apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rustfs
  namespace: argocd
spec:
  project: infra
  source:
    # Point to the official RustFS Helm repo
    repoURL: "https://charts.rustfs.com"
    chart: rustfs
    targetRevision: "0.0.85" # Matches the current stable-ish Alpha
    helm:
      releaseName: rustfs
      values: |
        mode:
          distributed:
            enabled: false
          standalone:
            enabled: true

        replicaCount: 1

        secret:
          rustfs:
            access_key: "admin"
            secret_key: "password123"

        storageclass:
          name: "longhorn"
          dataStorageSize: "10Gi"
          logStorageSize: "1Gi"

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        service:
          type: ClusterIP
          endpoint:
            port: 9000
          console:
            port: 9001

  destination:
    server: "https://kubernetes.default.svc"
    namespace: rustfs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
