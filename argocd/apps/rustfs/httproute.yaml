apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rustfs-route
  namespace: rustfs
spec:
  hostnames:
    - "rustfs.internal" # S3 API Endpoint
    - "rustfs-console.internal" # Web Management UI
  parentRefs:
    - name: tailscale-gateway
      namespace: tailscale
  rules:
    - matches:
        - hostname: "rustfs.internal"
      backendRefs:
        - name: rustfs-svc
          port: 9000
    - matches:
        - hostname: "rustfs-console.internal"
      backendRefs:
        - name: rustfs-svc
          port: 9001
