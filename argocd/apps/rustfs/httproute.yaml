apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rustfs-api-route
  namespace: rustfs
spec:
  parentRefs:
    - name: tailscale-gateway
      namespace: tailscale
  hostnames:
    - "rustfs.internal"
  rules:
    - backendRefs:
        - name: rustfs-svc
          port: 9000

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rustfs-console-route
  namespace: rustfs
spec:
  parentRefs:
    - name: tailscale-gateway
      namespace: tailscale
  hostnames:
    - "rustfs-console.internal"
  rules:
    - backendRefs:
        - name: rustfs-svc
          port: 9001
