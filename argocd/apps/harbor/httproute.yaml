apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: harbor-route
  namespace: harbor
spec:
  hostnames:
    - "harbor.internal"
  parentRefs:
    - name: tailscale-gateway
      namespace: tailscale
  rules:
    # Rule 1: Send API, Auth, and Docker traffic to Core
    - matches:
        - path: { type: PathPrefix, value: /api/ }
        - path: { type: PathPrefix, value: /v2/ }
        - path: { type: PathPrefix, value: /c/ }
        - path: { type: PathPrefix, value: /service/ }
      backendRefs:
        - name: harbor-core
          namespace: harbor
          port: 80
    # Rule 2: Everything else (UI assets) goes to Portal
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: harbor-portal
          namespace: harbor
          port: 80
