apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: harbor-route
  namespace: harbor
spec:
  hostnames:
    - "harbor.internal"
  parentRefs:
    - name: tailscale-gateway
      namespace: tailscale
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: harbor
          namespace: harbor
          port: 80
