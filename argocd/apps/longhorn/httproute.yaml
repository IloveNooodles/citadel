apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn-route
  namespace: longhorn-system
spec:
  hostnames:
    - "longhorn.internal"
  parentRefs:
    - name: tailscale-gateway
      namespace: tailscale
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: longhorn-frontend
          namespace: longhorn-system
          port: 80
